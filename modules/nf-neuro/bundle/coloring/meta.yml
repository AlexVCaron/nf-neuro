# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: bundle_coloring
description: Assign color to bundles.
keywords:
  - Bundles
  - Coloring
  - Tractometry
tools:
  - scilpy:
      description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing
        toolbox.
      homepage: https://github.com/scilus/scilpy.git

      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`

    - bundles:
        type: file
        description: Flatten list of trk files containing bundles to be colored.
        pattern: "*.trk"

output:
  - bundles:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`

      - "*_colored.trk":
          type: file
          description: Colored bundles file.
          pattern: "*_colored.trk"

  - versions:
      - versions.yml:
          type: file
          description: File containing software versions
          pattern: versions.yml

authors:
  - "@gagnonanthony"
maintainers:
  - "@gagnonanthony"
