---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: io_readbids
description: Module reading bids specification for an input folder.
keywords:
- Bids
- Input
- Structure
tools:
- scilpy:
    description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing
      toolbox.
    homepage: https://github.com/scilus/scilpy.git

input:
- - bids_folder:
      type: directory
      description: Folder containing bids file
      pattern: '*'

  - fs_folder:
      type: directory
      description: Folder containing fs file
      pattern: '*'

  - bids_ignore:
      type: file
      description: bids_ignore file
      pattern: '*.{bids_ignore}'

output:
- versions:
  - versions:
      type: file
      description: File containing software versions
      pattern: versions.yml

- bidsstructure:
  - bidsstructure:
      type: file
      description: json file containing tractoflow bids structure
      pattern: '*.{json}'

- versions:
  - versions:
      type: file
      description: File containing software versions
      pattern: versions.yml

authors:
- '@harshana2011'
