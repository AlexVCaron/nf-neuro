---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: preproc_topup
description: Prepare data and apply FSL topup
keywords:
  - DWI
  - distorsion
  - topup

tools:
  - ANTs:
      description: Advanced Normalization Tools (ANTs) for image processing.
      homepage: http://stnava.github.io/ANTs/
      identifier: ""
  - FSL:
      description: FSL Toolbox and Scilpy Toolbox
      homepage: https://fsl.fmrib.ox.ac.uk/fsl/fslwiki
      identifier: ""
  - scilpy:
      description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing
        toolbox.
      homepage: https://github.com/scilus/scilpy.git

      identifier: ""
input:
  # Only when we have meta
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'test', single_end:false ]`
    - dwi:
        type: file
        description: DWI Nifti image
        pattern: "*.{nii,nii.gz}"
    - bval:
        type: file
        description: B-values in FSL format [DWI].
        pattern: "*.bval"
    - bvec:
        type: file
        description: B-values in FSL format [DWI].
        pattern: "*.bvec"
    - b0:
        type: file
        description: b0 [DWI].
        pattern: "*.bvec"
    - rev_dwi:
        type: file
        description: DWI Nifti image [rev-DWI].
        pattern: "*.{nii,nii.gz}"
    - rev_bval:
        type: file
        description: B-values in FSL format [rev-DWI].
        pattern: "*.bval"
    - rev_bvec:
        type: file
        description: B-vectors in FSL format [rev-DWI].
        pattern: "*.bvec"
    - rev_b0:
        type: file
        description: Reversed b0 [rev-DWI].
        pattern: "*.{nii,nii.gz}"
  - - config_topup:
        type: file
        description: topup config file. See https://fsl.fmrib.ox.ac.uk/fsl/fslwiki/topup/TopupUsersGuide#Configuration_files
        pattern: "*cnf"
output:
  - topup_corrected_b0s:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*__corrected_b0s.nii.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*__corrected_b0s.nii.gz"
  - topup_fieldcoef:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*_fieldcoef.nii.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*_fieldcoef.nii.gz"
  - topup_movpart:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*_movpar.txt":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*__movpar.txt"
  - rev_b0_warped:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*__rev_b0_warped.nii.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*__rev_b0_warped.nii.gz"
  - rev_b0_mean:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*__rev_b0_mean.nii.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*__rev_b0_mean.nii.gz"
  - b0_mean:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*__b0_mean.nii.gz":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*__b0_mean.nii.gz"
  - mqc:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
      - "*_b0_topup_mqc.gif":
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'test', single_end:false ]`
          pattern: "*_b0_topup_mqc.gif"
  - versions:
      - versions.yml:
          type: file
          description: File containing software versions.
          pattern: versions.yml
authors:
  - "@arnaudbore"
